name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release (e.g. v0.1.9)'
        required: true

env:
  # Resolve tag once — works for both tag-push and manual dispatch triggers.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # macOS universal binary: build arm64 + x86_64 on the same runner, combine with lipo
  macos:
    name: universal-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/ccrouter \
            target/x86_64-apple-darwin/release/ccrouter \
            -output ccrouter
          lipo -info ccrouter

      # Ad-hoc sign the universal binary. Required on Apple Silicon (arm64 kernel
      # refuses to exec a binary with an invalid/missing signature — lipo-joined
      # binaries lose the per-slice ad-hoc signatures that rustc's linker adds).
      # This is NOT a Developer ID signature — it won't satisfy Gatekeeper on
      # browser-downloaded tarballs. Homebrew and `curl | sh` installs work fine
      # because neither sets the quarantine xattr.
      - name: Ad-hoc codesign
        run: |
          codesign --sign - --force --timestamp=none ccrouter
          codesign --verify --verbose ccrouter

      - name: Package
        run: |
          tar czf ccrouter-${{ env.RELEASE_TAG }}-universal-apple-darwin.tar.gz ccrouter

      - uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: ccrouter-${{ env.RELEASE_TAG }}-universal-apple-darwin.tar.gz

  # Linux builds (static musl — no system dependencies)
  linux:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            use_cross: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (ARM64)
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/ccrouter ccrouter
          tar czf ccrouter-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz ccrouter

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ccrouter-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz

  release:
    name: Publish release
    needs: [macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=${{ env.RELEASE_TAG }}
          # If release already exists (re-run), upload assets to existing release
          if gh release view "${tag}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Release ${tag} already exists — uploading assets to existing release."
            gh release upload "${tag}" --clobber \
              artifacts/*.tar.gz artifacts/checksums.txt
          else
            gh release create "${tag}" \
              --title "ccrouter ${tag}" \
              --notes "$(cat <<EOF
          ## Install

          **One-liner (macOS / Linux):**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | sh
          \`\`\`

          Installs to \`~/.local/bin\` by default. Override with \`INSTALL_DIR=/usr/local/bin\`.

          **Homebrew (macOS / Linux):**
          \`\`\`bash
          brew tap guo/tap
          brew install ccrouter
          \`\`\`

          **Manual download:**

          - macOS (universal): \`ccrouter-${tag}-universal-apple-darwin.tar.gz\`
          - Linux x86_64: \`ccrouter-${tag}-x86_64-unknown-linux-musl.tar.gz\`
          - Linux ARM64: \`ccrouter-${tag}-aarch64-unknown-linux-musl.tar.gz\`

          The macOS binary is ad-hoc signed — it works with Homebrew and the install script. Browser-downloaded tarballs may need \`xattr -dr com.apple.quarantine ccrouter\` before first run.

          See \`checksums.txt\` to verify your download.
          EOF
          )" \
              artifacts/*.tar.gz artifacts/checksums.txt
          fi

      # Push the new version + SHAs into guo/homebrew-tap so `brew upgrade ccrouter`
      # picks up the release automatically. Needs a PAT with `repo` scope on the tap
      # repo stored as HOMEBREW_TAP_TOKEN. Missing token → step skips with a warning;
      # the release itself is already published by this point.
      - name: Update Homebrew tap
        if: ${{ !contains(env.RELEASE_TAG, '-') }}  # skip pre-release tags like v0.2.0-rc1
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not set — skipping tap update." >&2
            exit 0
          fi

          TAG="${{ env.RELEASE_TAG }}"
          VERSION="${TAG#v}"
          MACOS_SHA=$(awk '/universal-apple-darwin/ {print $1}' artifacts/checksums.txt)
          LINUX_X86_SHA=$(awk '/x86_64-unknown-linux-musl/ {print $1}' artifacts/checksums.txt)
          LINUX_ARM_SHA=$(awk '/aarch64-unknown-linux-musl/ {print $1}' artifacts/checksums.txt)

          echo "Bumping ccrouter formula to ${VERSION}"
          echo "  macOS:     ${MACOS_SHA}"
          echo "  linux-x86: ${LINUX_X86_SHA}"
          echo "  linux-arm: ${LINUX_ARM_SHA}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/guo/homebrew-tap.git" tap
          cd tap

          # Rewrite version line + each sha256 keyed by the url line directly above it.
          awk \
            -v ver="${VERSION}" \
            -v macos="${MACOS_SHA}" \
            -v linux_x86="${LINUX_X86_SHA}" \
            -v linux_arm="${LINUX_ARM_SHA}" '
            /^  version "/ { sub(/"[^"]*"/, "\"" ver "\""); print; next }
            /url.*universal-apple-darwin/   { slot="macos" }
            /url.*x86_64-unknown-linux-musl/ { slot="linux_x86" }
            /url.*aarch64-unknown-linux-musl/ { slot="linux_arm" }
            /sha256 "/ {
              if      (slot == "macos")     { sub(/"[0-9a-f]+"/, "\"" macos "\"") }
              else if (slot == "linux_x86") { sub(/"[0-9a-f]+"/, "\"" linux_x86 "\"") }
              else if (slot == "linux_arm") { sub(/"[0-9a-f]+"/, "\"" linux_arm "\"") }
              slot=""
            }
            { print }
          ' Formula/ccrouter.rb > Formula/ccrouter.rb.new
          mv Formula/ccrouter.rb.new Formula/ccrouter.rb

          git diff --exit-code Formula/ccrouter.rb && { echo "Formula unchanged — nothing to push."; exit 0; } || true

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/ccrouter.rb
          git commit -m "ccrouter ${VERSION}"
          git push
