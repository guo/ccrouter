name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-13
          # Linux x86_64 (static musl)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          # Linux ARM64 (static musl, cross-compiled)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          bin=ccrouter
          target=${{ matrix.target }}
          tag=${{ github.ref_name }}
          archive="${bin}-${tag}-${target}.tar.gz"
          cp target/${target}/release/${bin} ${bin}
          tar czf ${archive} ${bin}
          echo "ARCHIVE=${archive}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # Build macOS universal binary by combining arm64 + x86_64
  universal-macos:
    name: aarch64+x86_64-apple-darwin (universal)
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: arm64

      - uses: actions/download-artifact@v4
        with:
          name: x86_64-apple-darwin
          path: x86_64

      - name: Build universal binary
        run: |
          tag=${{ github.ref_name }}
          tar xzf arm64/ccrouter-${tag}-aarch64-apple-darwin.tar.gz -C arm64
          tar xzf x86_64/ccrouter-${tag}-x86_64-apple-darwin.tar.gz -C x86_64
          lipo -create -output ccrouter arm64/ccrouter x86_64/ccrouter
          lipo -info ccrouter
          tar czf ccrouter-${tag}-universal-apple-darwin.tar.gz ccrouter
          echo "ARCHIVE=ccrouter-${tag}-universal-apple-darwin.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish release
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=${{ github.ref_name }}
          gh release create "${tag}" \
            --title "ccrouter ${tag}" \
            --notes "$(cat <<'EOF'
          ## Install

          **macOS (Apple Silicon / Intel universal):**
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${tag}/ccrouter-${tag}-universal-apple-darwin.tar.gz | tar xz
          sudo mv ccrouter /usr/local/bin/
          ```

          **Linux x86_64:**
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${tag}/ccrouter-${tag}-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv ccrouter /usr/local/bin/
          ```

          **Linux ARM64:**
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${tag}/ccrouter-${tag}-aarch64-unknown-linux-musl.tar.gz | tar xz
          sudo mv ccrouter /usr/local/bin/
          ```

          See `checksums.txt` to verify your download.
          EOF
          )" \
            artifacts/*.tar.gz artifacts/checksums.txt
