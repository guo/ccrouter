name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # macOS universal binary: build arm64 + x86_64 on the same runner, combine with lipo
  macos:
    name: universal-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/ccrouter \
            target/x86_64-apple-darwin/release/ccrouter \
            -output ccrouter
          lipo -info ccrouter
          tar czf ccrouter-${{ github.ref_name }}-universal-apple-darwin.tar.gz ccrouter

      - uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: ccrouter-${{ github.ref_name }}-universal-apple-darwin.tar.gz

  # Linux builds (static musl — no system dependencies)
  linux:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (ARM64)
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/ccrouter ccrouter
          tar czf ccrouter-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ccrouter

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ccrouter-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Publish release
    needs: [macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=${{ github.ref_name }}
          gh release create "${tag}" \
            --title "ccrouter ${tag}" \
            --notes "$(cat <<EOF
          ## Install

          **macOS (Apple Silicon + Intel universal):**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${tag}/ccrouter-${tag}-universal-apple-darwin.tar.gz | tar xz
          sudo mv ccrouter /usr/local/bin/
          \`\`\`

          **Linux x86_64:**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${tag}/ccrouter-${tag}-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv ccrouter /usr/local/bin/
          \`\`\`

          **Linux ARM64:**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${tag}/ccrouter-${tag}-aarch64-unknown-linux-musl.tar.gz | tar xz
          sudo mv ccrouter /usr/local/bin/
          \`\`\`

          Or use the install script:
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | sh
          \`\`\`

          See \`checksums.txt\` to verify your download.
          EOF
          )" \
            artifacts/*.tar.gz artifacts/checksums.txt
