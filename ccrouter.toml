# ccrouter.toml — example config
# Copy to ~/.config/ccrouter/config.toml or keep in the working directory.

[proxy]
port = 15721
host = "127.0.0.1"
log_level = "info"  # trace | debug | info | warn | error

[active]
# Change this value (or run `ccrouter switch <id>`) to switch providers.
# If ccrouter is running, it hot-reloads within a second.
profile = "anthropic"

# ─────────────────────────────────────────
# Profiles
# ─────────────────────────────────────────

[[profiles]]
id = "anthropic"
name = "Official Anthropic"
base_url = "https://api.anthropic.com"
api_key_env = "ANTHROPIC_API_KEY"
format = "anthropic"  # pass-through, no transformation

[[profiles]]
id = "openai"
name = "OpenAI GPT"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
format = "openai"  # transforms Anthropic Messages → OpenAI Chat Completions

[profiles.model_map]
"claude-3-5-sonnet-20241022" = "gpt-4o"
"claude-3-5-haiku-20241022" = "gpt-4o-mini"
"claude-3-haiku-20240307" = "gpt-4o-mini"
"claude-opus-4-5" = "gpt-4o"
"claude-sonnet-4-5" = "gpt-4o"
default_model = "gpt-4o"

[[profiles]]
id = "ollama"
name = "Local Ollama"
base_url = "http://localhost:11434/v1"
api_key_env = ""  # no auth needed for local Ollama
format = "openai"

[profiles.model_map]
default_model = "qwen2.5-coder:32b"  # change to your preferred local model

[[profiles]]
id = "openrouter"
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
format = "openai"

[profiles.model_map]
"claude-3-5-sonnet-20241022" = "anthropic/claude-3.5-sonnet"
"claude-opus-4-5" = "anthropic/claude-opus-4-5"
default_model = "openai/gpt-4o"

[[profiles]]
id = "groq"
name = "Groq"
base_url = "https://api.groq.com/openai/v1"
api_key_env = "GROQ_API_KEY"
format = "openai"

[profiles.model_map]
default_model = "llama-3.3-70b-versatile"

[[profiles]]
id = "deepseek"
name = "DeepSeek"
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"
format = "openai"

[profiles.model_map]
default_model = "deepseek-chat"
